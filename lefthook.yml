# Shared git hooks for the Teable integrations repo (managed by lefthook).
# https://lefthook.dev/configuration/

pre-commit:
  parallel: false
  commands:
    format:
      glob: '*.{js,ts,jsx,tsx}'
      run: npx oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: '*.{js,ts,jsx,tsx}'
      run: npx oxlint {staged_files}

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
